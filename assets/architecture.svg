<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 310" width="860" height="310">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#6e7781"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#0969da"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#2da44e"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#bc4c00"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="310" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="15" font-weight="700" fill="#24292f">
    Three-File Architecture — How Markdown Agent Works
  </text>

  <!-- ── plan.md ── x=16..175, y=88..208 -->
  <rect x="16" y="88" width="160" height="120" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="96" y="110" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="700" fill="#0550ae">📄 plan.md</text>
  <text x="96" y="128" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#57606a">YOU WRITE THIS</text>
  <line x1="36" y1="134" x2="156" y2="134" stroke="#0969da" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="96" y="150" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#24292f">## Goal</text>
  <text x="96" y="166" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">## Tasks</text>
  <text x="96" y="182" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">## Context</text>
  <text x="96" y="198" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">## Constraints</text>

  <!-- Arrow: plan.md → Agent -->
  <line x1="178" y1="148" x2="202" y2="148" stroke="#0969da" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="190" y="142" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#0969da">reads</text>

  <!-- ── Agent core ── x=208..652, y=68..228 -->
  <rect x="208" y="68" width="444" height="168" rx="10" fill="#ffffff" stroke="#8c959f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="92" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="14" font-weight="700" fill="#24292f">⚙  Markdown Agent</text>
  <line x1="228" y1="100" x2="632" y2="100" stroke="#d0d7de" stroke-width="1"/>

  <!-- Step boxes inside agent -->
  <!-- Step 1 -->
  <rect x="224" y="108" width="88" height="40" rx="5" fill="#f0f6ff" stroke="#0969da" stroke-width="1"/>
  <text x="268" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#0969da">① parse</text>
  <text x="268" y="140" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">plan + memory</text>
  <!-- mini arrow -->
  <line x1="314" y1="128" x2="326" y2="128" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="328" y="108" width="88" height="40" rx="5" fill="#fff8f0" stroke="#bc4c00" stroke-width="1"/>
  <text x="372" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#bc4c00">② prompt</text>
  <text x="372" y="140" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">build + inject</text>
  <!-- mini arrow -->
  <line x1="418" y1="128" x2="430" y2="128" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="432" y="108" width="88" height="40" rx="5" fill="#f0fff4" stroke="#2da44e" stroke-width="1"/>
  <text x="476" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#2da44e">③ LLM call</text>
  <text x="476" y="140" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">any backend</text>
  <!-- mini arrow -->
  <line x1="522" y1="128" x2="534" y2="128" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="536" y="108" width="88" height="40" rx="5" fill="#f5f0ff" stroke="#6e40c9" stroke-width="1"/>
  <text x="580" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#6e40c9">④ write</text>
  <text x="580" y="140" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">output + memory</text>

  <!-- Session note inside agent -->
  <text x="430" y="175" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8c959f">
    session metadata · task completion · elapsed time · word count
  </text>
  <text x="430" y="190" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8c959f">
    stored in memory.md for every run
  </text>
  <text x="430" y="210" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a" font-style="italic">
    git diff memory.md  ·  hand-edit context  ·  no database
  </text>

  <!-- Arrow: Agent → output.md -->
  <line x1="654" y1="148" x2="678" y2="148" stroke="#2da44e" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="666" y="142" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#2da44e">writes</text>

  <!-- ── output.md ── x=684..844, y=88..208 -->
  <rect x="684" y="88" width="160" height="120" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="764" y="110" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="700" fill="#116329">📄 output.md</text>
  <text x="764" y="128" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#57606a">AGENT WRITES THIS</text>
  <line x1="700" y1="134" x2="828" y2="134" stroke="#2da44e" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="764" y="150" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#24292f">## Goal</text>
  <text x="764" y="166" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">## Tasks [x]</text>
  <text x="764" y="182" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">## Results</text>
  <text x="764" y="198" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">session metadata</text>

  <!-- ── memory.md ── x=310..550, y=248..298 -->
  <rect x="310" y="248" width="240" height="52" rx="8" fill="#fff1e5" stroke="#bc4c00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="268" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="700" fill="#7d2d00">📄 memory.md</text>
  <text x="430" y="286" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">State · Context · Sessions history — persists across runs</text>

  <!-- Arrow: Agent → memory.md (down) -->
  <line x1="430" y1="238" x2="430" y2="246" stroke="#bc4c00" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Arrow: memory.md → Agent (curved loop back, up-left) -->
  <path d="M310,268 Q260,268 260,200 Q260,168 208,148" stroke="#bc4c00" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="240" y="224" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#bc4c00">reads on</text>
  <text x="240" y="236" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#bc4c00">next run</text>
</svg>
