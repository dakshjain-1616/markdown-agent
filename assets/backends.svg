<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#8c959f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="15" font-weight="700" fill="#24292f">
    LLM Backend Auto-Detection — Priority Order
  </text>
  <text x="430" y="46" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">
    First matching condition wins · set env vars to switch backends
  </text>

  <!-- Priority label -->
  <text x="26" y="72" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8c959f">highest priority</text>
  <line x1="16" y1="78" x2="838" y2="78" stroke="#d0d7de" stroke-width="1" marker-end="url(#arr)"/>
  <text x="830" y="72" text-anchor="end"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8c959f">fallback</text>

  <!-- Box dimensions: w=148, gap=20, start x=20 -->
  <!-- Centers: 94, 262, 430, 598, 766 -->

  <!-- ── 1: dry-run ── -->
  <rect x="20" y="86" width="148" height="110" rx="8" fill="#f0f6ff" stroke="#0969da" stroke-width="1.5"/>
  <text x="94" y="108" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#0550ae">Dry-run</text>
  <text x="94" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">no LLM called</text>
  <line x1="36" y1="132" x2="152" y2="132" stroke="#0969da" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="94" y="148" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#24292f" font-weight="600">--dry-run flag</text>
  <text x="94" y="163" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">echoes prompt,</text>
  <text x="94" y="178" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">shows token count</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="141" x2="186" y2="141" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 2: llama.cpp ── -->
  <rect x="188" y="86" width="148" height="110" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5"/>
  <text x="262" y="108" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#116329">Local GGUF</text>
  <text x="262" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">llama-cpp-python</text>
  <line x1="204" y1="132" x2="320" y2="132" stroke="#2da44e" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="262" y="148" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#24292f" font-weight="600">LLAMA_MODEL_PATH</text>
  <text x="262" y="163" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">fully offline,</text>
  <text x="262" y="178" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">any GGUF model</text>

  <!-- Arrow 2→3 -->
  <line x1="338" y1="141" x2="354" y2="141" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 3: Anthropic ── -->
  <rect x="356" y="86" width="148" height="110" rx="8" fill="#fff1e5" stroke="#bc4c00" stroke-width="1.5"/>
  <text x="430" y="108" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#7d2d00">Anthropic</text>
  <text x="430" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">Claude API</text>
  <line x1="372" y1="132" x2="488" y2="132" stroke="#bc4c00" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="430" y="148" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#24292f" font-weight="600">ANTHROPIC_API_KEY</text>
  <text x="430" y="163" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">claude-sonnet-4-6</text>
  <text x="430" y="178" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">default model</text>

  <!-- Arrow 3→4 -->
  <line x1="506" y1="141" x2="522" y2="141" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 4: OpenAI ── -->
  <rect x="524" y="86" width="148" height="110" rx="8" fill="#f5f0ff" stroke="#6e40c9" stroke-width="1.5"/>
  <text x="598" y="108" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#4f2d99">OpenAI</text>
  <text x="598" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">or compatible API</text>
  <line x1="540" y1="132" x2="656" y2="132" stroke="#6e40c9" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="598" y="148" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#24292f" font-weight="600">OPENAI_API_KEY</text>
  <text x="598" y="163" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">gpt-4o default,</text>
  <text x="598" y="178" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">OPENAI_BASE_URL too</text>

  <!-- Arrow 4→5 -->
  <line x1="674" y1="141" x2="690" y2="141" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 5: Mock ── -->
  <rect x="692" y="86" width="148" height="110" rx="8" fill="#f6f8fa" stroke="#8c959f" stroke-width="1.5"/>
  <text x="766" y="108" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#57606a">Mock</text>
  <text x="766" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">always available</text>
  <line x1="708" y1="132" x2="824" y2="132" stroke="#8c959f" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="766" y="148" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#24292f" font-weight="600">no keys needed</text>
  <text x="766" y="163" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">deterministic output,</text>
  <text x="766" y="178" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a">great for CI / tests</text>

  <!-- Priority numbers -->
  <text x="94" y="207" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#0550ae" font-weight="700">① explicit</text>
  <text x="262" y="207" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#116329" font-weight="700">② local</text>
  <text x="430" y="207" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#7d2d00" font-weight="700">③ cloud</text>
  <text x="598" y="207" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#4f2d99" font-weight="700">④ cloud</text>
  <text x="766" y="207" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#57606a" font-weight="700">⑤ fallback</text>
</svg>
